name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            curl \
            debhelper \
            desktop-file-utils \
            dh-python \
            fakeroot \
            gir1.2-adw-1 \
            gir1.2-gtk-4.0 \
            pybuild-plugin-pyproject \
            python3-all \
            python3-build \
            python3-gi \
            python3-packaging \
            python3-pip \
            python3-pytest \
            python3-setuptools \
            python3-wheel \
            rsync

      - name: Compile Python sources
        run: python3 -m compileall src tests

      - name: Run test suite
        run: python3 -m pytest

      - name: Check release metadata
        run: ./scripts/check_release_metadata.sh

      - name: Build wheel and sdist
        run: python3 -m build

      - name: Build Debian package
        run: ./scripts/build_deb.sh

      - name: Build AppImage
        run: ./scripts/build_appimage.sh

      - name: Collect release assets
        run: ./scripts/collect_release_assets.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bluelatch-build-artifacts
          if-no-files-found: error
          path: |
            dist/release/*
            dist/debian/*.buildinfo
            dist/debian/*.changes
