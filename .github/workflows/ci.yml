name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            appstream \
            build-essential \
            curl \
            debhelper \
            desktop-file-utils \
            dh-python \
            fakeroot \
            gir1.2-adw-1 \
            gir1.2-gtk-4.0 \
            pybuild-plugin-pyproject \
            python3-all \
            python3-build \
            python3-gi \
            python3-packaging \
            python3-pytest \
            python3-setuptools \
            python3-wheel \
            rsync

      - name: Install Python dependencies
        run: |
          # AppImage wheel builds need the setup-python toolchain, not Ubuntu dist-packages.
          python -m pip install --upgrade pip setuptools wheel build pytest

      - name: Compile Python sources
        run: python -m compileall src tests

      - name: Run test suite
        run: python -m pytest

      - name: Check release metadata
        run: ./scripts/check_release_metadata.sh

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify Debian build dependencies
        run: |
          required_packages=(
            build-essential
            debhelper
            dh-python
            fakeroot
            pybuild-plugin-pyproject
            python3-all
            python3-build
            python3-packaging
            python3-pytest
            python3-setuptools
            python3-wheel
            rsync
          )

          for package in "${required_packages[@]}"; do
            dpkg -s "$package" >/dev/null 2>&1 || {
              echo "Missing Debian package required for build: $package" >&2
              exit 1
            }
          done

      - name: Build Debian package
        run: ./scripts/build_deb.sh

      - name: Build AppImage
        env:
          PYTHON_BIN: python
        run: ./scripts/build_appimage.sh

      - name: Collect release assets
        run: ./scripts/collect_release_assets.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bluelatch-build-artifacts
          if-no-files-found: error
          path: |
            dist/release/*
            dist/debian/*.buildinfo
            dist/debian/*.changes
