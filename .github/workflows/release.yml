name: Release

on:
  push:
    tags:
      - v*

jobs:
  build-release:
    runs-on: ubuntu-24.04
    outputs:
      pages_enabled: ${{ steps.apt_signing.outputs.enabled }}
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          # AppImage wheel builds need the setup-python toolchain, not Ubuntu dist-packages.
          python -m pip install --upgrade pip setuptools wheel build pytest

      - name: Verify tag matches application version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(PYTHONPATH=src python -c 'from bluelatch.version import __version__; print(__version__)')"
          if [[ "$TAG_VERSION" != "$APP_VERSION" ]]; then
            echo "Tag version $TAG_VERSION does not match application version $APP_VERSION" >&2
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            appstream \
            build-essential \
            curl \
            debhelper \
            desktop-file-utils \
            dh-python \
            fakeroot \
            gir1.2-adw-1 \
            gir1.2-gtk-4.0 \
            gpg \
            libgtk-4-dev \
            pybuild-plugin-pyproject \
            python3-all \
            python3-build \
            python3-gi \
            python3-packaging \
            python3-pip \
            python3-pytest \
            python3-setuptools \
            python3-wheel \
            reprepro \
            rsync

      - name: Compile Python sources
        run: python -m compileall src tests

      - name: Run test suite
        run: python -m pytest

      - name: Check release metadata
        run: ./scripts/check_release_metadata.sh

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify Debian build dependencies
        run: |
          required_packages=(
            build-essential
            debhelper
            dh-python
            fakeroot
            pybuild-plugin-pyproject
            python3-all
            python3-build
            python3-packaging
            python3-pytest
            python3-setuptools
            python3-wheel
            rsync
          )

          for package in "${required_packages[@]}"; do
            dpkg -s "$package" >/dev/null 2>&1 || {
              echo "Missing Debian package required for build: $package" >&2
              exit 1
            }
          done

      - name: Build Debian package
        run: ./scripts/build_deb.sh

      - name: Build AppImage
        env:
          PYTHON_BIN: python
        run: ./scripts/build_appimage.sh

      - name: Render release notes
        run: ./scripts/render_release_notes.sh

      - name: Check APT signing configuration
        id: apt_signing
        env:
          BLUELATCH_APT_GPG_PRIVATE_KEY: ${{ secrets.BLUELATCH_APT_GPG_PRIVATE_KEY }}
          BLUELATCH_APT_GPG_PASSPHRASE: ${{ secrets.BLUELATCH_APT_GPG_PASSPHRASE }}
        run: |
          if [[ -z "$BLUELATCH_APT_GPG_PRIVATE_KEY" || -z "$BLUELATCH_APT_GPG_PASSPHRASE" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "APT signing secrets are missing. Skipping APT repository publication for this release."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import APT signing key
        if: steps.apt_signing.outputs.enabled == 'true'
        id: gpg
        env:
          BLUELATCH_APT_GPG_PRIVATE_KEY: ${{ secrets.BLUELATCH_APT_GPG_PRIVATE_KEY }}
          BLUELATCH_APT_GPG_PASSPHRASE: ${{ secrets.BLUELATCH_APT_GPG_PASSPHRASE }}
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
          printf 'pinentry-mode loopback\n' > "$GNUPGHOME/gpg.conf"
          gpgconf --kill gpg-agent || true

          printf '%s' "$BLUELATCH_APT_GPG_PRIVATE_KEY" | \
            gpg --batch --yes --pinentry-mode loopback --passphrase "$BLUELATCH_APT_GPG_PASSPHRASE" --import

          FINGERPRINT="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "fpr" { print $10; exit }')"
          if [[ -z "$FINGERPRINT" ]]; then
            echo "Unable to determine imported GPG key fingerprint" >&2
            exit 1
          fi

          printf 'BlueLatch release signing warmup\n' | \
            gpg --batch --yes --pinentry-mode loopback --passphrase "$BLUELATCH_APT_GPG_PASSPHRASE" \
              --local-user "$FINGERPRINT" --armor --clearsign > /dev/null

          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "fingerprint=$FINGERPRINT" >> "$GITHUB_OUTPUT"

      - name: Publish APT repository content
        if: steps.apt_signing.outputs.enabled == 'true'
        env:
          BLUELATCH_APT_GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}
          BLUELATCH_APT_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/apt
        run: ./scripts/publish_apt_repo.sh

      - name: Collect release assets
        run: ./scripts/collect_release_assets.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bluelatch-release-workflow-artifacts
          if-no-files-found: error
          path: |
            dist/release/*
            dist/debian/*.buildinfo
            dist/debian/*.changes
            dist/pages/**

      - name: Upload Pages artifact
        if: steps.apt_signing.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: BlueLatch ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/release/*

  deploy-pages:
    needs: build-release
    if: needs.build-release.outputs.pages_enabled == 'true'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
